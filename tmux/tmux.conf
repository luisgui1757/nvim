# tmux config — Rose Pine, vi-mode, true-color, Ghostty/WT-friendly.

# ---- Terminal capabilities ---------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -ga terminal-overrides ",alacritty:RGB"
set -ga terminal-overrides ",*256col*:RGB"

# Focus events so nvim's :autoread/gitsigns react when you tab back.
set -g focus-events on

# Extended keys: send Ctrl+J distinct from Enter, Ctrl+I distinct from Tab,
# etc. (tmux 3.2+). Needed by lazygit's Ctrl+J / Ctrl+K "move commit
# down/up" so they don't degrade to Enter. csi-u format is the modern
# encoding; the *:extkeys terminal-feature flag tells tmux every outer
# terminal can carry the sequence. Harmless on psmux (it doesn't implement
# these options; unknown options are warnings, not fatal errors). For psmux
# specifically the fix is the Alt+J/K fallback in lazygit/config.yml.
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features ',*:extkeys'

# ---- Behavior ----------------------------------------------------------------
# Mouse ON in tmux/psmux on purpose. Nvim keeps its own mouse off (see
# `vim.opt.mouse = ""` + the three defensive options in vim-options.lua),
# but everywhere else we want pane-switch on click, scroll-wheel into
# copy-mode, drag-resize on the pane border, and Windows Terminal-native
# selection (which psmux's mouse-selection layer also relays).
set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g status-keys vi
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "tmux:#S #W"
set -g allow-rename off
set -g aggressive-resize on

# ---- Prefix: C-b (default; macOS eats C-Space for input-source switching) ----
set -g prefix C-b
bind C-b send-prefix

# ---- Pane management ---------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# ---- Copy-mode (vi-style, with real system-clipboard plumbing) ---------------
# OSC52 broadcasts copies via the terminal — works across SSH and into the
# host clipboard from Ghostty/Windows Terminal without any helper installed.
set -g set-clipboard on

bind -T copy-mode-vi v send -X begin-selection

# Local pipe: prefer the platform's native clipboard CLI when available so a
# native paste still works even where the terminal swallows OSC52.
# Picked in this order: pbcopy (mac) → wl-copy (Wayland) → xclip → xsel
# → win32yank (WSL) → fallback to OSC52 only.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && command -v wl-copy >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && command -v xclip >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && command -v xsel >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -i -b"'
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && ! command -v xsel >/dev/null 2>&1 && command -v win32yank.exe >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"'
# OSC52-only fallback: copy stays inside the terminal emulator's broadcast
# (still works because set-clipboard is on).
if-shell '! command -v pbcopy >/dev/null 2>&1 && ! command -v wl-copy >/dev/null 2>&1 && ! command -v xclip >/dev/null 2>&1 && ! command -v xsel >/dev/null 2>&1 && ! command -v win32yank.exe >/dev/null 2>&1' \
    'bind -T copy-mode-vi y send -X copy-pipe-and-cancel'

# ---- Rose Pine status bar (canonical rose-pine/tmux role colors) -------------
# Aligned to https://github.com/rose-pine/tmux main variant: status-style is
# pine on base, inactive windows are iris on base, active windows are gold
# on base (no bold, no bg block), activity flag is base on rose, pane borders
# are hl_high inactive / gold active, messages are muted/base (command form
# base/gold). window-status-format / -current-format are left UNSET (-gu) so
# tmux builds the cell from the *-style settings -- same path the upstream
# theme uses, cleaner than embedding inline #[fg=...] specs.
set -g status-position bottom
set -g status-style              "fg=#31748f,bg=#191724"   # pine on base
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[fg=#c4a7e7,bold] #S #[fg=#908caa,nobold]│ "
set -g status-right "#[fg=#9ccfd8] %a %d %b #[fg=#f6c177] %H:%M "

setw -g window-status-style          "fg=#c4a7e7,bg=#191724"   # iris on base
setw -g window-status-current-style  "fg=#f6c177,bg=#191724"   # gold on base
setw -g window-status-activity-style "fg=#191724,bg=#ebbcba"   # base on rose
setw -gu window-status-format
setw -gu window-status-current-format
setw -g window-status-separator      ""

# Pane borders match rose-pine/tmux: hl_high (dark grey) inactive, gold active.
set -g pane-border-style          "fg=#524f67"
set -g pane-active-border-style   "fg=#f6c177"
set -g display-panes-active-colour "#e0def4"
set -g display-panes-colour        "#f6c177"

# Messages / command line — also role-based per rose-pine/tmux.
set -g message-style          "fg=#6e6a86,bg=#191724"   # muted on base
set -g message-command-style  "fg=#191724,bg=#f6c177"   # base on gold

# Windows/psmux overlay: pulled in by bootstrap.ps1's symlink. `-q` makes this
# a silent no-op on Unix where the file is not symlinked, so the same tmux.conf
# stays cross-platform. See tmux/tmux.windows.conf for what it sets.
source-file -q "~/.tmux.windows.conf"
