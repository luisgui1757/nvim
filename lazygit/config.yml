# lazygit config -- cross-platform, symlinked into:
#   macOS / Linux:  ~/.config/lazygit/config.yml
#   Windows:        %LOCALAPPDATA%\lazygit\config.yml
#
# Windows path was %APPDATA% in earlier commits; lazygit v0.58 actually
# reads from %LOCALAPPDATA% (verified via `lazygit --print-config-dir`).
#
# Intentionally minimal. Earlier revisions overrode moveDownCommit /
# moveUpCommit to work around psmux dropping Ctrl+J. That was a dead end:
# lazygit v0.58 only registers `<a-enter>` as an Alt key in
# pkg/config/keynames.go LabelByKey, and Alt+letter combinations like
# `<a-j>` / `<alt+j>` are rejected as "Unrecognized key". The only valid
# alternatives are F-keys (`<f7>`/`<f8>`) and Shift+Arrows (`<s-up>` /
# `<s-down>`), both of which can also be eaten by psmux. So we use the
# defaults and document the psmux workflow instead.
#
# Defaults that work:
#   - Unix tmux: Ctrl+J / Ctrl+K move commits up/down (default).
#   - Windows Terminal directly (no psmux): Ctrl+J / Ctrl+K work.
#
# psmux workaround (Windows + psmux v3.3.4): Ctrl+J degrades to Enter via
# the ConPTY relay (psmux upstream issue #150). Move commits via lazygit's
# interactive rebase: press `i` on a commit, then `s` to squash / `r` to
# reword / drag with the rebase TODO list. Or open lazygit outside psmux.
#
# Add user customizations below this line.
{}
