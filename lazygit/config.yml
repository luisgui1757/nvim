# lazygit config -- cross-platform, symlinked into:
#   macOS / Linux:  ~/.config/lazygit/config.yml
#   Windows:        %LOCALAPPDATA%\lazygit\config.yml
#
# Windows path was %APPDATA% in earlier commits but lazygit v0.58 actually
# reads from %LOCALAPPDATA% (verified via `lazygit --print-config-dir`).
#
# Why a config file at all: under psmux (ConPTY tmux clone on Windows) the
# default `<ctrl+j>` / `<ctrl+k>` "move commit down/up" bindings do not fire.
# Ctrl+J is ASCII LF (0x0A) -- the same byte as Enter -- so the wire needs
# Win32-input-mode (DECSET 9001), modifyOtherKeys, or the kitty keyboard
# protocol to disambiguate. Windows Terminal supports Win32-input-mode and
# lazygit's tcell/v3 can decode it, but psmux v3.3.4 does not relay the
# escape sequence through to the inner app, so lazygit just sees Enter.
#
# Fix: override the binding to Alt+J / Alt+K. Alt+letter is the old
# Meta/ESC-prefix path (sent as ESC <letter> on the wire) and is unambiguous
# everywhere -- through ConPTY + psmux on Windows, and through real tmux on
# Unix. lazygit's MoveDownCommit / MoveUpCommit are typed as `string` (not
# `[]string`), so multi-key arrays do not parse -- we pick the most portable
# single key. The trade-off: Unix muscle-memory Ctrl+J is replaced by Alt+J
# for these two actions; every other Ctrl-prefixed lazygit binding still works.
keybinding:
  commits:
    moveDownCommit: <alt+j>
    moveUpCommit: <alt+k>
