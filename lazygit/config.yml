# lazygit config -- cross-platform, symlinked into:
#   macOS / Linux:  ~/.config/lazygit/config.yml
#   Windows:        %LOCALAPPDATA%\lazygit\config.yml
#
# Windows path was %APPDATA% in earlier commits; lazygit v0.58 actually
# reads from %LOCALAPPDATA% (verified via `lazygit --print-config-dir`).
#
# psmux v3.3.4 does not relay Windows Terminal's Win32-input-mode
# disambiguation to panes, so Ctrl+J arrives at lazygit as Enter. The
# Windows-only psmux overlay (`tmux/tmux.windows.conf`) catches C-j / C-k at
# psmux's root parser and sends F8 / F7 to the pane instead. Those F-keys are
# registered lazygit key names, so bind moveDownCommit / moveUpCommit to them
# here.
#
# Trade-off: lazygit v0.58 stores these as single string fields, so this
# override replaces the default Ctrl+J / Ctrl+K bindings instead of adding
# alternatives. F8 / F7 are the canonical move-commit keys everywhere this
# config is loaded. Inside Windows psmux, Ctrl+J / Ctrl+K still work by being
# translated to F8 / F7 before lazygit sees them.
#
# Unix tmux is not given the psmux root binds because bootstrap.sh does not
# symlink tmux.windows.conf; only bootstrap.ps1 does.
keybinding:
  commits:
    moveDownCommit: '<f8>'
    moveUpCommit: '<f7>'
