name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Dogfood install-deps dry run
        run: |
          set -euxo pipefail
          ./install-deps.sh --dry-run --all
      - name: Install deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl shellcheck tmux zsh bats python3-pip
          if ! sudo snap install starship --classic; then
            curl -fsSL https://starship.rs/install.sh -o /tmp/starship-install.sh
            sh /tmp/starship-install.sh -y
          fi
          curl -fsSL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh -o /tmp/cargo-binstall.sh
          bash /tmp/cargo-binstall.sh
          "$HOME/.cargo/bin/cargo-binstall" -y taplo-cli hyperfine
          python3 -m pip install --user --break-system-packages yamllint editorconfig-checker
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          # PowerShell so tests/static/ps1_parse.sh catches .ps1 syntax regressions.
          source /etc/os-release
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          rm /tmp/packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion'

          # Neovim stable release tarball avoids AppImage/FUSE and old asset-name drift.
          curl -fsSL https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz -o /tmp/nvim-linux-x86_64.tar.gz
          sudo rm -rf /opt/nvim-linux-x86_64
          sudo tar -xzf /tmp/nvim-linux-x86_64.tar.gz -C /opt
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
          nvim --version | head -n 1
      - name: Static lint
        run: |
          set -euo pipefail
          make test-static
      - name: shellcheck
        run: |
          set -euo pipefail
          make lint
      - name: Bootstrap idempotency
        run: |
          set -euo pipefail
          make test-bootstrap
      - name: Shell smoke
        run: |
          set -euo pipefail
          make test-shell
      - name: Starship render + perf
        run: |
          set -euo pipefail
          make test-starship
      - name: Tmux load
        run: |
          set -euo pipefail
          make test-tmux
      - name: Nvim plenary busted
        run: |
          set -euo pipefail
          make test-nvim

  macos:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Dogfood install-deps dry run
        run: |
          set -euxo pipefail
          ./install-deps.sh --dry-run --all
      - name: Install deps
        run: |
          set -euxo pipefail
          brew install shellcheck neovim tmux starship taplo hyperfine yamllint editorconfig-checker bats-core
      - name: Make test (full matrix)
        run: |
          set -euo pipefail
          make test

  windows:
    runs-on: windows-2025
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Dogfood install-deps dry run
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          .\install-deps.ps1 -DryRun -All
      - name: Install deps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          if (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          }
          $pester = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -ge [version]'5.0.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $pester) {
            Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.5.0 -SkipPublisherCheck
          }
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          Import-Module PSScriptAnalyzer -Force
          Get-Module Pester, PSScriptAnalyzer | Format-Table Name,Version,Path -AutoSize
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module PSScriptAnalyzer -Force
          $diag = @(Invoke-ScriptAnalyzer -Path shells/powershell_profile.ps1 -Severity Warning,Error)
          $diag | Format-Table -AutoSize
          if ($diag.Count -gt 0) { throw "PSScriptAnalyzer reported $($diag.Count) warning/error finding(s)." }
      - name: Pester (profile + bootstrap)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          Invoke-Pester -Path tests/powershell, tests/bootstrap -Output Detailed
