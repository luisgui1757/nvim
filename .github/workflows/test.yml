name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck tmux zsh bats
          sudo snap install starship --classic || curl -sS https://starship.rs/install.sh | sh -s -- -y
          curl -fsSL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          ~/.cargo/bin/cargo binstall -y taplo-cli hyperfine || true
          pip install --user yamllint editorconfig-checker
          # Neovim 0.11 (stable)
          curl -fL -o /tmp/nvim.appimage https://github.com/neovim/neovim/releases/download/stable/nvim.appimage
          chmod +x /tmp/nvim.appimage
          sudo mv /tmp/nvim.appimage /usr/local/bin/nvim
      - name: Static lint
        run: make test-static
      - name: shellcheck
        run: make lint
      - name: Bootstrap idempotency
        run: make test-bootstrap
      - name: Shell smoke
        run: make test-shell
      - name: Starship render + perf
        run: make test-starship
      - name: Tmux load
        run: make test-tmux
      - name: Nvim plenary busted
        run: make test-nvim

  macos:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          brew update
          brew install shellcheck neovim tmux starship taplo hyperfine yamllint editorconfig-checker bats-core
      - name: Make test (full matrix)
        run: make test

  windows:
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -RequiredVersion 5.5.0
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          # Starship via winget if available
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            winget install --id Starship.Starship -e --accept-source-agreements --accept-package-agreements
          }
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $diag = Invoke-ScriptAnalyzer -Path shells/powershell_profile.ps1 -Severity Warning,Error
          $diag | Format-Table
          if ($diag.Count -gt 0) { exit 1 }
      - name: Pester (profile + bootstrap)
        shell: pwsh
        run: |
          Invoke-Pester -Path tests/powershell, tests/bootstrap -Output Detailed
